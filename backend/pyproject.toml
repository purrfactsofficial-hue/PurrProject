[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.coverage.run]
omit = [
  "venv/*",
  "tests/*",
  "scripts/*",
  "scheduler.py",
  "routes/analytics.py",
]

[tool.coverage.report]
show_missing = true
